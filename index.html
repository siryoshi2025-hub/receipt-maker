<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>領収書メーカー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Yu Gothic',sans-serif;background:#f0ece3;min-height:100vh}
.wrap{max-width:500px;margin:0 auto;display:flex;flex-direction:column;min-height:100vh}
/* Header */
.hdr{background:#1a1a1a;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:99}
.hdr-title{color:#f5f0e8;font-size:16px;font-weight:700;letter-spacing:.2em}
.hdr-sub{color:#666;font-size:9px;letter-spacing:.1em}
.btn-print{background:#c0392b;color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-print.ok{background:#27ae60}
/* Toast */
#toast{display:none;font-size:12px;text-align:center;padding:8px;font-weight:500}
/* Content */
.content{flex:1;padding:16px 12px 90px;overflow-y:auto}
/* Section label */
.sec{font-size:10px;color:#a08060;font-weight:500;letter-spacing:.12em;margin-bottom:8px}
/* Card */
.card{background:#fff;border-radius:12px;padding:16px 14px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
/* Field */
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;color:#8a7a6a;font-weight:500;letter-spacing:.06em;margin-bottom:5px}
.field input{width:100%;padding:12px 13px;border:1.5px solid #d8ccb8;border-radius:8px;background:#faf8f4;font-size:16px;color:#1a1a1a;font-family:inherit;-webkit-appearance:none;outline:none}
.field input:focus{border-color:#8a6a3a;box-shadow:0 0 0 3px rgba(107,76,42,.12)}
.amt-wrap{position:relative}
.amt-yen{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#999;pointer-events:none}
#amt-disp{font-size:11px;color:#8a7a6a;text-align:right;margin-top:3px;min-height:16px}
/* Store chips */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.chip{padding:9px 16px;border-radius:20px;border:2px solid #d8ccb8;background:#fff;color:#4a3828;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.chip.active{border-color:#6b4c2a;background:#6b4c2a;color:#fff}
/* Selected store card */
.store-card{background:#fff;border-radius:12px;padding:11px 14px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;justify-content:space-between;align-items:center}
.store-info{font-size:12px;color:#555;line-height:1.8}
.store-name-big{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
.btn-edit-store{font-size:12px;color:#8a7a6a;background:#f0ece3;border:none;border-radius:6px;padding:6px 10px;cursor:pointer;font-family:inherit;white-space:nowrap}
/* Paper options */
.paper-list{display:flex;flex-direction:column;gap:8px}
.paper-opt{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border:2px solid transparent;border-radius:8px;cursor:pointer;background:#faf8f4;font-family:inherit;width:100%}
.paper-opt.active{background:#f5ede3;border-color:#6b4c2a}
.paper-icon{border-radius:2px;flex-shrink:0;border:2px solid #ccc}
.paper-opt.active .paper-icon{border-color:#6b4c2a;background:rgba(107,76,42,.08)}
.paper-label{font-size:14px;font-weight:600;color:#1a1a1a}
.paper-sub{font-size:11px;color:#aaa}
.paper-check{font-size:12px;color:#6b4c2a;font-weight:600}
/* Store mgmt */
.store-row{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.07);display:flex;justify-content:space-between;align-items:center}
.store-row-name{font-size:15px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
.store-row-sub{font-size:12px;color:#888;line-height:1.7}
.btn-add-store{width:100%;padding:14px;background:#6b4c2a;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:4px;letter-spacing:.05em}
/* Store form */
.form-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.btn-back{background:none;border:none;font-size:20px;cursor:pointer;color:#6b4c2a;padding:0;line-height:1}
.form-title{font-size:14px;font-weight:600;color:#1a1a1a}
.btn-save{width:100%;padding:14px;background:#6b4c2a;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:10px}
.btn-save:disabled{background:#ccc;cursor:default}
.btn-del{width:100%;padding:12px;background:none;border:1.5px solid #e8bcbc;border-radius:12px;font-size:14px;font-weight:500;color:#c0392b;cursor:pointer;font-family:inherit}
/* No store */
.no-store{background:#fff;border-radius:12px;padding:18px 16px;box-shadow:0 1px 4px rgba(0,0,0,.07);text-align:center;margin-bottom:14px}
.no-store p{font-size:13px;color:#aaa;margin-bottom:12px}
.btn-go-store{background:#6b4c2a;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
/* Preview */
.preview{background:#faf8f4;border:1px solid #d8ccb8;border-radius:4px;padding:28px 22px;color:#1a1a1a;box-shadow:0 2px 12px rgba(0,0,0,.1)}
.preview.small{padding:20px 16px}
.pv-badge{display:flex;justify-content:flex-end;margin-bottom:6px}
.pv-badge span{font-size:9px;color:#aaa;border:1px solid #ddd;border-radius:3px;padding:2px 6px}
.pv-title{font-size:26px;font-weight:700;text-align:center;letter-spacing:.4em;margin-bottom:2px}
.pv-title.small{font-size:20px}
.pv-date{text-align:center;font-size:10px;color:#888;margin-bottom:18px}
.pv-date.small{margin-bottom:12px}
.pv-recip{border-bottom:1.5px solid #1a1a1a;padding-bottom:5px;margin-bottom:14px}
.pv-recip.small{margin-bottom:10px}
.pv-rname{font-size:16px;font-weight:600}
.pv-rname.small{font-size:13px}
.pv-rsuf{font-size:11px;margin-left:4px;color:#555}
.pv-amt{background:#f0ece3;border:1px solid #c8b89a;border-radius:3px;padding:11px 14px;margin-bottom:14px;display:flex;align-items:baseline;gap:6px}
.pv-amt.small{padding:8px 10px;margin-bottom:10px}
.pv-amt-lbl{font-size:10px;color:#777}
.pv-amt-val{font-size:22px;font-weight:700;flex:1;text-align:right}
.pv-amt-val.small{font-size:16px}
.pv-amt-suf{font-size:10px;color:#777}
.pv-note{font-size:12px;color:#555;margin-bottom:16px}
.pv-note.small{font-size:10px;margin-bottom:10px}
.pv-div{border:none;border-top:1px solid #d8ccb8;margin-bottom:12px}
.pv-center{text-align:center;font-size:10px;color:#aaa;letter-spacing:.1em;margin-bottom:16px}
.pv-center.small{margin-bottom:10px}
.pv-footer{display:flex;align-items:flex-end;justify-content:space-between;gap:6px}
.pv-stamp{width:56px;height:56px;flex-shrink:0;border:1.5px dashed #ccc;border-radius:3px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.pv-stamp span{font-size:8px;color:#ccc}
.pv-store-right{display:flex;align-items:flex-end;gap:8px;flex:1;justify-content:flex-end}
.pv-store-txt{text-align:right;font-size:11px;color:#444;line-height:1.8}
.pv-store-txt.small{font-size:9px}
.pv-store-name{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:2px}
.pv-store-name.small{font-size:11px}
.pv-hint{font-size:11px;color:#a08060;text-align:center;margin-bottom:12px}
/* Tab bar */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:500px;background:#fff;border-top:1px solid #e8e0d5;display:flex;z-index:100}
.tab{flex:1;padding:12px 0 8px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;color:#bbb;font-family:inherit}
.tab.active{color:#6b4c2a}
.tab-icon{font-size:18px}
.tab-label{font-size:10px;font-weight:500}
.tab-bar{width:18px;height:2px;background:#6b4c2a;border-radius:2px;margin-top:2px}
/* Print */
@media print{
  .hdr,.tabbar,#toast,.no-print{display:none!important}
  body{background:#fff}
  .content{padding:0}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr no-print">
    <div>
      <div class="hdr-title">領収書</div>
      <div class="hdr-sub">RECEIPT MAKER</div>
    </div>
    <button class="btn-print" onclick="doPrint()">🖨 印刷・PDF</button>
  </div>
  <div id="toast"></div>
  <div class="content" id="content"></div>
  <div class="tabbar no-print">
    <button class="tab active" id="tab-edit" onclick="showTab('edit')">
      <span class="tab-icon">✏️</span>
      <span class="tab-label">入力</span>
    </button>
    <button class="tab" id="tab-preview" onclick="showTab('preview')">
      <span class="tab-icon">👁️</span>
      <span class="tab-label">プレビュー</span>
    </button>
    <button class="tab" id="tab-stores" onclick="showTab('stores')">
      <span class="tab-icon">🏪</span>
      <span class="tab-label">店舗管理</span>
    </button>
  </div>
</div>

<script>
/* ── State ── */
var state = {
  tab: 'edit',
  receipt: { date: today(), recipientName:'', amount:'', note:'お品代として' },
  stores: [],
  selId: null,
  paperId: 'a4',
  editStore: null
};

var PAPERS = [
  {id:'a4',      label:'A4',        sub:'210×297mm', w:210, h:297, cat:'large'},
  {id:'b5',      label:'B5',        sub:'182×257mm', w:182, h:257, cat:'large'},
  {id:'a6',      label:'A6',        sub:'105×148mm', w:105, h:148, cat:'medium'},
  {id:'a4third', label:'A4三分割',  sub:'99×210mm',  w:99,  h:210, cat:'medium'},
  {id:'market',  label:'市販領収書', sub:'84×175mm',  w:84,  h:175, cat:'small'},
];

var DB_KEY = 'rcpt_stores_v3';

function today(){ return new Date().toISOString().slice(0,10); }
function fmtYen(v){ var n=String(v).replace(/[^0-9]/g,''); return n?Number(n).toLocaleString('ja-JP'):''; }
function toJP(iso){ if(!iso)return''; var p=iso.split('-'); return p[0]+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日'; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

function loadStores(){ try{ var v=localStorage.getItem(DB_KEY); return v?JSON.parse(v):[]; }catch(e){ return []; } }
function saveStores(list){ try{ localStorage.setItem(DB_KEY,JSON.stringify(list)); return true; }catch(e){ return false; } }

function selStore(){ return state.stores.find(function(s){ return s.id===state.selId; })||null; }
function selPaper(){ return PAPERS.find(function(p){ return p.id===state.paperId; })||PAPERS[0]; }

function showToast(msg, ok){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.style.display='block';
  t.style.background=ok?'#eaf7ed':'#fdecea';
  t.style.color=ok?'#27ae60':'#c0392b';
  setTimeout(function(){ t.style.display='none'; }, 2200);
}

/* ── Tabs ── */
function showTab(tab){
  state.tab=tab;
  state.editStore=null;
  ['edit','preview','stores'].forEach(function(t){
    var el=document.getElementById('tab-'+t);
    if(el){ el.className='tab'+(t===tab?' active':''); }
  });
  render();
}

/* ── Seal SVG ── */
function sealSVG(name, size){
  size=size||76;
  var raw=(name||'印').trim().slice(0,8);
  var len=raw.length;
  var lines=len<=4?[raw]:[raw.slice(0,Math.ceil(len/2)),raw.slice(Math.ceil(len/2))];
  var fs=len<=3?14:len===4?12:len<=6?10:9;
  var lh=fs+5;
  var cx=size/2, cy=size/2;
  var startY=cy-(lines.length*lh)/2+lh/2;
  var ro=size/2-2, ri=size/2-8;
  var texts=lines.map(function(l,i){
    return '<text x="'+cx+'" y="'+(startY+i*lh)+'" text-anchor="middle" dominant-baseline="middle" fill="#c0392b" font-size="'+fs+'" font-family="serif" font-weight="bold" letter-spacing="'+(len<=4?2:1)+'">'+esc(l)+'</text>';
  }).join('');
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" style="flex-shrink:0">'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+ro+'" fill="none" stroke="#c0392b" stroke-width="2.2"/>'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+ri+'" fill="none" stroke="#c0392b" stroke-width="1"/>'+
    '<line x1="'+(size*0.13)+'" y1="'+cy+'" x2="'+(size*0.87)+'" y2="'+cy+'" stroke="#c0392b" stroke-width="0.8" opacity="0.45"/>'+
    texts+'</svg>';
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ── Render ── */
function render(){
  var c=document.getElementById('content');
  if(state.tab==='edit')     c.innerHTML=renderEdit();
  else if(state.tab==='preview') c.innerHTML=renderPreview();
  else if(state.tab==='stores')  c.innerHTML=renderStores();
}

/* ─ Edit tab ─ */
function renderEdit(){
  var r=state.receipt, s=selStore(), p=selPaper();
  var html='';

  // Store section
  html+='<div class="sec">▸ 使用する店舗</div>';
  if(state.stores.length===0){
    html+='<div class="no-store"><p>店舗が登録されていません</p>'+
      '<button class="btn-go-store" onclick="showTab(\'stores\')">＋ 店舗を登録する</button></div>';
  } else {
    html+='<div class="chips">';
    state.stores.forEach(function(st){
      html+='<button class="chip'+(state.selId===st.id?' active':'')+'" onclick="selStoreId(\''+st.id+'\')">'+esc(st.name)+'</button>';
    });
    html+='</div>';
  }

  if(s){
    html+='<div class="store-card">'+
      '<div><div class="store-name-big">'+esc(s.name)+'</div>'+
      '<div class="store-info">'+
      (s.address?'<div>'+esc(s.address)+'</div>':'')+
      (s.phone?'<div>TEL: '+esc(s.phone)+'</div>':'')+
      '</div></div>'+
      '<button class="btn-edit-store" onclick="editStoreById(\''+s.id+'\')">編集</button>'+
      '</div>';
  }

  // Receipt fields
  html+='<div class="sec">▸ 領収書情報</div><div class="card">';
  html+='<div class="field"><label>日付 <span style="color:#c0392b">*</span></label>'+
    '<input type="date" value="'+r.date+'" onchange="setR(\'date\',this.value)"></div>';
  html+='<div class="field"><label>宛先（御中）<span style="color:#c0392b">*</span></label>'+
    '<input type="text" value="'+esc(r.recipientName)+'" placeholder="例：株式会社〇〇" oninput="setR(\'recipientName\',this.value)"></div>';
  html+='<div class="field"><label>金額（円）<span style="color:#c0392b">*</span></label>'+
    '<div class="amt-wrap"><span class="amt-yen">¥</span>'+
    '<input type="tel" inputmode="numeric" value="'+esc(r.amount)+'" placeholder="10000" style="padding-left:26px" oninput="setAmt(this.value)">'+
    '</div><div id="amt-disp">'+(r.amount?'¥'+fmtYen(r.amount)+' 円（税込）':'')+'</div></div>';
  html+='<div class="field"><label>但し書き</label>'+
    '<input type="text" value="'+esc(r.note)+'" placeholder="お品代として" oninput="setR(\'note\',this.value)"></div>';
  html+='</div>';

  // Paper
  html+='<div class="sec">▸ 用紙サイズ</div><div class="card"><div class="paper-list">';
  PAPERS.forEach(function(pp){
    var act=state.paperId===pp.id;
    var iw=pp.h>pp.w?Math.round(22*pp.w/pp.h):22;
    var ih=pp.h>pp.w?22:Math.round(22*pp.h/pp.w);
    html+='<button class="paper-opt'+(act?' active':'')+'" onclick="setPaper(\''+pp.id+'\')">'+
      '<div style="display:flex;align-items:center;gap:10px">'+
      '<div class="paper-icon" style="width:'+iw+'px;height:'+ih+'px"></div>'+
      '<div><div class="paper-label">'+esc(pp.label)+'</div><div class="paper-sub">'+pp.sub+'</div></div>'+
      '</div>'+(act?'<span class="paper-check">✓ 選択中</span>':'')+
      '</button>';
  });
  html+='</div></div>';
  return html;
}

/* ─ Preview tab ─ */
function renderPreview(){
  var r=state.receipt, s=selStore(), p=selPaper();
  var sm=p.cat==='small';
  var amt=r.amount?'¥ '+fmtYen(r.amount):'¥ ___________';
  var sn=s?(s.sealName||s.name):'印';
  var sz=sm?56:68;

  var html='<p class="pv-hint">右上ボタンで印刷・PDF保存できます</p>'+
    '<div class="preview'+(sm?' small':'')+'">';
  html+='<div class="pv-badge"><span>'+esc(p.label)+'・'+p.sub+'</span></div>';
  html+='<div class="pv-title'+(sm?' small':'')+'">領　収　書</div>';
  html+='<div class="pv-date'+(sm?' small':'')+'">'+toJP(r.date)+'</div>';
  html+='<div class="pv-recip'+(sm?' small':'')+'">'+
    '<span class="pv-rname'+(sm?' small':'')+'">'+esc(r.recipientName||'　　　　　　　　')+'</span>'+
    '<span class="pv-rsuf">御中</span></div>';
  html+='<div class="pv-amt'+(sm?' small':'')+'">'+
    '<span class="pv-amt-lbl">金額</span>'+
    '<span class="pv-amt-val'+(sm?' small':'')+'">'+amt+'</span>'+
    '<span class="pv-amt-suf">－（税込）</span></div>';
  html+='<div class="pv-note'+(sm?' small':'')+'">但し、'+esc(r.note||'　　　　　　　　')+'</div>';
  html+='<hr class="pv-div"><div class="pv-center'+(sm?' small':'')+'">上記正に領収いたしました</div>';
  html+='<div class="pv-footer">';
  if(!sm){
    html+='<div class="pv-stamp"><span>収 入</span><span>印 紙</span></div>';
  }
  html+='<div class="pv-store-right">'+
    '<div class="pv-store-txt'+(sm?' small':'')+'">'+
    '<div class="pv-store-name'+(sm?' small':'')+'">'+(s?esc(s.name):'　　　　　')+'</div>'+
    (s&&s.address?'<div>'+esc(s.address)+'</div>':'')+
    (s&&s.phone?'<div>TEL: '+esc(s.phone)+'</div>':'')+
    '</div>'+sealSVG(sn,sz)+
    '</div></div></div>';
  return html;
}

/* ─ Stores tab ─ */
function renderStores(){
  if(state.editStore!==null) return renderStoreForm();
  var html='<div class="sec">▸ 登録済み店舗</div>';
  if(state.stores.length===0){
    html+='<p style="text-align:center;color:#aaa;font-size:13px;padding:30px 0">まだ登録されていません</p>';
  }
  state.stores.forEach(function(s){
    html+='<div class="store-row">'+
      '<div><div class="store-row-name">'+esc(s.name)+'</div>'+
      '<div class="store-row-sub">'+
      (s.address?'<div>'+esc(s.address)+'</div>':'')+
      (s.phone?'<div>TEL: '+esc(s.phone)+'</div>':'')+
      (s.sealName?'<div>印鑑: '+esc(s.sealName)+'</div>':'')+
      '</div></div>'+
      '<button class="btn-edit-store" onclick="editStoreById(\''+s.id+'\')">編集</button>'+
      '</div>';
  });
  html+='<button class="btn-add-store" onclick="newStore()">＋ 新しい店舗を登録</button>';
  return html;
}

function renderStoreForm(){
  var es=state.editStore;
  var isNew=!es.id;
  var html='<div class="form-header">'+
    '<button class="btn-back" onclick="cancelEdit()">←</button>'+
    '<div class="form-title">'+(isNew?'新規店舗を登録':'店舗情報を編集')+'</div></div>'+
    '<div class="card">'+
    field('店名 / 会社名','text',es.name,'例：創一路','setEF(\'name\',this.value)',true)+
    field('住所','text',es.address,'例：宮城県仙台市〇〇','setEF(\'address\',this.value)')+
    field('電話番号','tel',es.phone,'例：022-000-0000','setEF(\'phone\',this.value)')+
    field('押印テキスト（空欄時は店名）','text',es.sealName,'例：創一路','setEF(\'sealName\',this.value)')+
    '</div>'+
    '<button class="btn-save" id="btn-save-store" onclick="saveStore()"'+(es.name.trim()?'':' disabled')+'>保存する</button>'+
    (!isNew?'<button class="btn-del" onclick="delStore()">この店舗を削除</button>':'');
  return html;
}

function field(label,type,val,ph,onInput,req){
  return '<div class="field"><label>'+esc(label)+(req?'<span style="color:#c0392b"> *</span>':'')+
    '</label><input type="'+type+'" value="'+esc(val||'')+'" placeholder="'+esc(ph||'')+
    '" oninput="'+onInput+'"></div>';
}

/* ── Actions ── */
function setR(k,v){
  state.receipt[k]=v;
  if(k==='amount'){
    var d=document.getElementById('amt-disp');
    if(d) d.textContent=v?('¥'+fmtYen(v)+' 円（税込）'):'';
  }
}
function setAmt(v){ state.receipt.amount=v.replace(/[^0-9]/g,''); setR('amount',state.receipt.amount); }
function selStoreId(id){ state.selId=id; render(); }
function setPaper(id){ state.paperId=id; render(); }
function editStoreById(id){
  var s=state.stores.find(function(x){ return x.id===id; });
  if(s){ state.editStore=Object.assign({},s); state.tab='stores'; render(); }
}
function newStore(){ state.editStore={name:'',address:'',phone:'',sealName:''}; render(); }
function cancelEdit(){ state.editStore=null; render(); }
function setEF(k,v){
  state.editStore[k]=v;
  var btn=document.getElementById('btn-save-store');
  if(btn) btn.disabled=!state.editStore.name.trim();
}
function saveStore(){
  var es=state.editStore;
  if(!es.name.trim()) return;
  var next;
  if(es.id){
    next=state.stores.map(function(s){ return s.id===es.id?Object.assign({},es):s; });
  } else {
    var ns=Object.assign({},es,{id:uid()});
    next=state.stores.concat([ns]);
    state.selId=ns.id;
  }
  state.stores=next;
  saveStores(next);
  state.editStore=null;
  showToast('✓ 保存しました',true);
  render();
}
function delStore(){
  var es=state.editStore;
  if(!confirm('「'+es.name+'」を削除しますか？')) return;
  var next=state.stores.filter(function(s){ return s.id!==es.id; });
  state.stores=next;
  saveStores(next);
  if(state.selId===es.id) state.selId=next.length?next[0].id:null;
  state.editStore=null;
  showToast('削除しました',true);
  render();
}
