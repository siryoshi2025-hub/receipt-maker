<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>領収書メーカー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans',sans-serif;background:#f0ece3;padding-bottom:20px}
.hdr{background:#1a1a1a;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
h1{color:#f5f0e8;font-size:16px;font-weight:700;letter-spacing:.2em}
small{color:#666;font-size:9px;display:block}
.wrap{max-width:500px;margin:0 auto;padding:0 12px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.sec{font-size:10px;color:#a08060;font-weight:600;letter-spacing:.1em;margin-bottom:8px}
label{display:block;font-size:11px;color:#8a7a6a;margin-bottom:5px;margin-top:12px}
label:first-child{margin-top:0}
input,select{width:100%;padding:12px;border:1.5px solid #d8ccb8;border-radius:8px;background:#faf8f4;font-size:16px;font-family:inherit;color:#1a1a1a;-webkit-appearance:none;outline:none}
input:focus{border-color:#6b4c2a}
.hint{font-size:11px;color:#8a7a6a;text-align:right;margin-top:3px;min-height:16px}
.btn{display:block;width:100%;padding:14px;background:#6b4c2a;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:14px}
.btn-red{background:#c0392b;border-radius:8px;width:auto;display:inline-block;padding:9px 14px;font-size:13px;margin:0}
.btn-sm{background:#f0ece3;border:none;border-radius:6px;padding:6px 10px;font-size:12px;color:#6b4c2a;cursor:pointer;font-family:inherit}
.row{display:flex;justify-content:space-between;align-items:center}
.store-name{font-size:14px;font-weight:700;color:#1a1a1a}
.store-sub{font-size:12px;color:#888;margin-top:2px}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.chip{padding:8px 14px;border-radius:20px;border:2px solid #d8ccb8;background:#fff;color:#4a3828;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.chip.on{border-color:#6b4c2a;background:#6b4c2a;color:#fff}
.divider{border:none;border-top:1px solid #eee;margin:12px 0}
#stores-section{display:none}
</style>
</head>
<body>

<div class="hdr">
  <div><h1>領　収　書</h1><small>RECEIPT MAKER</small></div>
  <button class="btn btn-red" onclick="doPrint()">🖨 印刷・PDF</button>
</div>

<div class="wrap">

  <!-- 店舗選択 -->

  <div class="sec">▸ 使用する店舗</div>
  <div class="card">
    <div class="chips" id="chips"></div>
    <div id="sel-store-info" style="font-size:12px;color:#555;margin-bottom:8px"></div>
    <div class="divider"></div>
    <button class="btn-sm" onclick="toggleStores()">🏪 店舗を管理する</button>
  </div>

  <!-- 店舗管理 -->

  <div id="stores-section">
    <div class="sec">▸ 店舗管理</div>
    <div class="card" id="store-list"></div>
    <div class="card">
      <div style="font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:12px" id="form-title">新規店舗を登録</div>
      <label>店名 *</label><input type="text" id="es-name" placeholder="例：創一路">
      <label>住所</label><input type="text" id="es-addr" placeholder="例：宮城県仙台市〇〇">
      <label>電話番号</label><input type="tel" id="es-tel" placeholder="例：022-000-0000">
      <label>押印テキスト（空欄時は店名）</label><input type="text" id="es-seal" placeholder="例：創一路">
      <input type="hidden" id="es-id">
      <button class="btn" onclick="saveStore()">保存する</button>
      <button class="btn" style="background:none;color:#c0392b;border:1.5px solid #e8bcbc;margin-top:8px" id="del-btn" onclick="delStore()" style="display:none">この店舗を削除</button>
    </div>
  </div>

  <!-- 領収書情報 -->

  <div class="sec">▸ 領収書情報</div>
  <div class="card">
    <label>日付</label>
    <input type="date" id="f-date">
    <label>宛先（御中）</label>
    <input type="text" id="f-recip" placeholder="例：株式会社〇〇">
    <label>金額（円）</label>
    <input type="tel" id="f-amount" placeholder="10000" oninput="updateAmt(this)">
    <div class="hint" id="amt-hint"></div>
    <label>但し書き</label>
    <input type="text" id="f-note" value="お品代として">
  </div>

  <!-- 用紙サイズ -->

  <div class="sec">▸ 用紙サイズ</div>
  <div class="card">
    <select id="f-paper">
      <option value="a4">A4（210×297mm）</option>
      <option value="b5">B5（182×257mm）</option>
      <option value="a6">A6（105×148mm）</option>
      <option value="a4t">A4三分割（99×210mm）</option>
      <option value="mk">市販領収書（84×175mm）</option>
    </select>
  </div>

<button class="btn" onclick="doPrint()">🖨 印刷・PDF出力</button>

</div>

<script>
var DB = 'rcpt_simple_v1';
var stores = [];
var selId = null;

var PAPERS = {
  a4:{w:210,h:297}, b5:{w:182,h:257}, a6:{w:105,h:148},
  a4t:{w:99,h:210}, mk:{w:84,h:175}
};

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function fmtYen(v){ var n=parseInt(v)||0; return n?n.toLocaleString('ja-JP'):''; }
function toJP(s){
  if(!s)return'';
  var p=s.split('-');
  return p[0]+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日';
}
function h(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function g(id){ return document.getElementById(id); }

function load(){ try{ var v=localStorage.getItem(DB); stores=v?JSON.parse(v):[]; }catch(e){ stores=[]; } }
function save(){ try{ localStorage.setItem(DB,JSON.stringify(stores)); }catch(e){} }

function renderChips(){
  var c=g('chips'); if(!c)return;
  if(stores.length===0){ c.innerHTML='<span style="font-size:13px;color:#aaa">店舗を下で登録してください</span>'; return; }
  var out='';
  for(var i=0;i<stores.length;i++){
    var s=stores[i];
    out+='<button class="chip'+(selId===s.id?' on':'')+'" onclick="selStore(\''+s.id+'\')">'+h(s.name)+'</button>';
  }
  g('chips').innerHTML=out;
  var info=g('sel-store-info');
  var sel=getSelStore();
  if(sel){
    info.innerHTML='<strong>'+h(sel.name)+'</strong>'+(sel.addr?'&nbsp;'+h(sel.addr):'')+(sel.tel?'&nbsp;TEL:'+h(sel.tel):'');
  } else { info.innerHTML=''; }
}

function renderStoreList(){
  var el=g('store-list'); if(!el)return;
  if(stores.length===0){ el.innerHTML='<p style="font-size:13px;color:#aaa;text-align:center;padding:10px">まだ登録されていません</p>'; return; }
  var out='';
  for(var i=0;i<stores.length;i++){
    var s=stores[i];
    out+='<div class="row" style="padding:8px 0;border-bottom:1px solid #f0ece3">'+
      '<div><div class="store-name">'+h(s.name)+'</div>'+
      '<div class="store-sub">'+(s.addr?h(s.addr):'')+(s.tel?' / TEL:'+h(s.tel):'')+'</div></div>'+
      '<button class="btn-sm" onclick="loadForm(\''+s.id+'\')">編集</button></div>';
  }
  el.innerHTML=out;
}

function getSelStore(){
  for(var i=0;i<stores.length;i++){ if(stores[i].id===selId)return stores[i]; }
  return null;
}

function selStore(id){ selId=id; renderChips(); }

function toggleStores(){
  var sec=g('stores-section');
  sec.style.display=sec.style.display==='none'?'block':'none';
  if(sec.style.display==='block'){ renderStoreList(); clearForm(); }
}

function clearForm(){
  g('es-name').value=''; g('es-addr').value='';
  g('es-tel').value=''; g('es-seal').value=''; g('es-id').value='';
  g('form-title').textContent='新規店舗を登録';
  g('del-btn').style.display='none';
}

function loadForm(id){
  for(var i=0;i<stores.length;i++){
    if(stores[i].id===id){
      var s=stores[i];
      g('es-name').value=s.name||''; g('es-addr').value=s.addr||'';
      g('es-tel').value=s.tel||''; g('es-seal').value=s.seal||'';
      g('es-id').value=s.id;
      g('form-title').textContent='店舗情報を編集';
      g('del-btn').style.display='block';
      break;
    }
  }
}

function saveStore(){
  var name=g('es-name').value.trim();
  if(!name){ alert('店名を入力してください'); return; }
  var id=g('es-id').value;
  var store={id:id||uid(),name:name,addr:g('es-addr').value.trim(),tel:g('es-tel').value.trim(),seal:g('es-seal').value.trim()};
  if(id){
    for(var i=0;i<stores.length;i++){ if(stores[i].id===id){ stores[i]=store; break; } }
  } else {
    stores.push(store); selId=store.id;
  }
  save(); renderChips(); renderStoreList(); clearForm();
  alert('保存しました！');
}

function delStore(){
  var id=g('es-id').value;
  if(!id||!confirm('削除しますか？'))return;
  stores=stores.filter(function(s){return s.id!==id;});
  if(selId===id)selId=stores.length?stores[0].id:null;
  save(); renderChips(); renderStoreList(); clearForm();
}

function updateAmt(el){
  el.value=el.value.replace(/[^0-9]/g,'');
  var hint=g('amt-hint');
  if(hint)hint.textContent=el.value?'¥'+fmtYen(el.value)+' 円（税込）':'';
}

function doPrint(){
  var sel=getSelStore();
  var date=g('f-date').value;
  var recip=g('f-recip').value;
  var amount=g('f-amount').value;
  var note=g('f-note').value||'お品代として';
  var paperId=g('f-paper').value;
  var p=PAPERS[paperId]||PAPERS.a4;
  var amt=amount?'¥ '+fmtYen(amount):'¥ ___________';
  var sealName=sel?(sel.seal||sel.name):'印';

  var raw=String(sealName).slice(0,8);
  var len=raw.length;
  var lines=len<=4?[raw]:[raw.slice(0,Math.ceil(len/2)),raw.slice(Math.ceil(len/2))];
  var fs=len<=3?14:len===4?12:len<=6?10:9;
  var lh=fs+5;
  var startY=38-(lines.length*lh)/2+lh/2;
  var sg='';
  for(var i=0;i<lines.length;i++){
    sg+='<text x="38" y="'+(startY+i*lh)+'" text-anchor="middle" dominant-baseline="middle" fill="#c0392b" font-size="'+fs+'" font-family="serif" font-weight="bold">'+h(lines[i])+'</text>';
  }

  var doc='<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><title>領収書</title>'+
    '<style>@page{size:'+p.w+'mm '+p.h+'mm;margin:10mm}*{box-sizing:border-box;margin:0;padding:0}body{font-family:serif;width:'+p.w+'mm}'+
    '.T{font-size:28px;font-weight:700;text-align:center;letter-spacing:.4em;margin-bottom:4px}'+
    '.D{text-align:center;font-size:12px;color:#888;margin-bottom:20px}'+
    '.R{border-bottom:1.5px solid #000;padding-bottom:6px;margin-bottom:16px}'+
    '.RN{font-size:17px;font-weight:600}.RS{font-size:12px;color:#555;margin-left:4px}'+
    '.A{background:#f0ece3;border:1px solid #c8b89a;padding:10px 14px;margin-bottom:16px;display:flex;align-items:baseline;gap:8px}'+
    '.AV{font-size:24px;font-weight:700;flex:1;text-align:right}'+
    '.N{font-size:12px;color:#555;margin-bottom:18px}'+
    '.HR{border:none;border-top:1px solid #d8ccb8;margin-bottom:12px}'+
    '.C{text-align:center;font-size:11px;color:#aaa;letter-spacing:.1em;margin-bottom:16px}'+
    '.F{display:flex;align-items:flex-end;justify-content:space-between;gap:8px}'+
    '.ST{width:60px;height:60px;border:1.5px dashed #bbb;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;font-size:9px;color:#bbb;line-height:1.8}'+
    '.SR{display:flex;align-items:flex-end;gap:10px;flex:1;justify-content:flex-end}'+
    '.SI{text-align:right;font-size:11px;color:#555;line-height:1.75}'+
    '.SN{font-size:14px;font-weight:700;margin-bottom:2px}'+
    '@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style></head><body>'+

```
'<div class="T">領　収　書</div><div class="D">'+toJP(date)+'</div>'+
'<div class="R"><span class="RN">'+h(recip||'　　　　　　　　')+'</span><span class="RS">御中</span></div>'+
'<div class="A"><span style="font-size:11px;color:#888">金額</span><span class="AV">'+amt+'</span><span style="font-size:11px;color:#888">－（税込）</span></div>'+
'<div class="N">但し、'+h(note)+'</div>'+
'<div class="HR"></div><div class="C">上記正に領収いたしました</div>'+
'<div class="F"><div class="ST"><span>収 入</span><span>印 紙</span></div>'+
'<div class="SR"><div class="SI"><div class="SN">'+(sel?h(sel.name):'')+'</div>'+
(sel&&sel.addr?'<div>'+h(sel.addr)+'</div>':'')+
(sel&&sel.tel?'<div>TEL:'+h(sel.tel)+'</div>':'')+
'</div><svg width="72" height="72" viewBox="0 0 76 76">'+
'<circle cx="38" cy="38" r="35" fill="none" stroke="#c0392b" stroke-width="2.2"/>'+
'<circle cx="38" cy="38" r="29" fill="none" stroke="#c0392b" stroke-width="1"/>'+
'<line x1="10" y1="38" x2="66" y2="38" stroke="#c0392b" stroke-width="0.8" opacity="0.4"/>'+
sg+'</svg></div></div>'+
'<scr'+'ipt>window.onload=function(){setTimeout(function(){window.print();},400);}<\/scr'+'ipt>'+
'</body></html>';
```

var w=window.open(’’,’_blank’);
if(w){w.document.write(doc);w.document.close();}
}

/* 起動 */
load();
if(stores.length)selId=stores[0].id;
var today=new Date();
var m=today.getMonth()+1;
var d=today.getDate();
g(‘f-date’).value=today.getFullYear()+’-’+(m<10?‘0’+m:m)+’-’+(d<10?‘0’+d:d);
renderChips();
</script>

</body>
</html>
